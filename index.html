<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>우리집 레시피북</title>
<style>
  :root {
    --bg: #EEEAE0;
    --surface: #F8F5EE;
    --text: #22261F;
    --text-muted: #5B5F50;
    --border: rgba(34,38,31,0.14);
    --accent: #2F6F5E;
    --accent-contrast: #F8F5EE;
    --region-han: #2F6F5E;
    --region-asia: #A5741B;
    --region-eu: #7B3F56;
    --region-am: #A8431F;
    --swatch-pine: #2F6F5E;
    --swatch-gold: #A5741B;
    --swatch-plum: #7B3F56;
    --swatch-rust: #A8431F;
    --swatch-slate: #3B5E7A;
    --swatch-olive: #6B7A2A;
    --swatch-maroon: #7A2A3B;
    --swatch-cyan: #2A6B7A;
    --shadow: 0 1px 2px rgba(34,38,31,.06), 0 10px 26px -14px rgba(34,38,31,.22);

    --font-display: Georgia, "Noto Serif KR", "Nanum Myeongjo", "Apple SD Gothic Neo", serif;
    --font-body: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    --font-mono: ui-monospace, Menlo, Consolas, "D2Coding", "Apple SD Gothic Neo", monospace;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #181C15;
      --surface: #20251B;
      --text: #ECE7D8;
      --text-muted: #A7A891;
      --border: rgba(236,231,216,0.14);
      --accent: #6FBFA0;
      --accent-contrast: #10140D;
      --region-han: #6FBFA0;
      --region-asia: #E0A83E;
      --region-eu: #C97FA0;
      --region-am: #E2775A;
      --swatch-pine: #6FBFA0;
      --swatch-gold: #E0A83E;
      --swatch-plum: #C97FA0;
      --swatch-rust: #E2775A;
      --swatch-slate: #7FB0D9;
      --swatch-olive: #B9CC5E;
      --swatch-maroon: #CC5E7F;
      --swatch-cyan: #5EC2CC;
      --shadow: 0 1px 2px rgba(0,0,0,.4), 0 10px 30px -14px rgba(0,0,0,.65);
    }
  }
  :root[data-theme="dark"] {
    --bg: #181C15;
    --surface: #20251B;
    --text: #ECE7D8;
    --text-muted: #A7A891;
    --border: rgba(236,231,216,0.14);
    --accent: #6FBFA0;
    --accent-contrast: #10140D;
    --region-han: #6FBFA0;
    --region-asia: #E0A83E;
    --region-eu: #C97FA0;
    --region-am: #E2775A;
    --swatch-pine: #6FBFA0;
    --swatch-gold: #E0A83E;
    --swatch-plum: #C97FA0;
    --swatch-rust: #E2775A;
    --swatch-slate: #7FB0D9;
    --swatch-olive: #B9CC5E;
    --swatch-maroon: #CC5E7F;
    --swatch-cyan: #5EC2CC;
    --shadow: 0 1px 2px rgba(0,0,0,.4), 0 10px 30px -14px rgba(0,0,0,.65);
  }
  :root[data-theme="light"] {
    --bg: #EEEAE0;
    --surface: #F8F5EE;
    --text: #22261F;
    --text-muted: #5B5F50;
    --border: rgba(34,38,31,0.14);
    --accent: #2F6F5E;
    --accent-contrast: #F8F5EE;
    --region-han: #2F6F5E;
    --region-asia: #A5741B;
    --region-eu: #7B3F56;
    --region-am: #A8431F;
    --swatch-pine: #2F6F5E;
    --swatch-gold: #A5741B;
    --swatch-plum: #7B3F56;
    --swatch-rust: #A8431F;
    --swatch-slate: #3B5E7A;
    --swatch-olive: #6B7A2A;
    --swatch-maroon: #7A2A3B;
    --swatch-cyan: #2A6B7A;
    --shadow: 0 1px 2px rgba(34,38,31,.06), 0 10px 26px -14px rgba(34,38,31,.22);
  }

  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  .wrap {
    max-width: 980px;
    margin: 0 auto;
    padding: 3rem 1.5rem 5rem;
  }

  header.book-header {
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
    padding-bottom: 2rem;
    border-bottom: 1px solid var(--border);
    margin-bottom: 1.75rem;
  }
  .eyebrow {
    font-family: var(--font-mono);
    font-size: 0.72rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  h1.book-title {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: clamp(2rem, 4vw, 2.75rem);
    margin: 0;
    text-wrap: balance;
    letter-spacing: -0.01em;
  }
  .book-sub {
    color: var(--text-muted);
    font-size: 1rem;
    max-width: 60ch;
  }
  .book-usage {
    font-size: 0.85rem;
    color: var(--text-muted);
  }
  .book-usage kbd {
    font-family: var(--font-mono);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0.05rem 0.4rem;
    font-size: 0.78em;
  }

  .toolbar-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
    margin-bottom: 2rem;
  }
  .filters {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
  }
  .toolbar-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
  }
  .chip {
    font-family: var(--font-mono);
    font-size: 0.78rem;
    letter-spacing: 0.03em;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    padding: 0.4rem 0.85rem;
    border-radius: 999px;
    cursor: pointer;
    transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
  }
  .chip[data-active="true"] {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--accent-contrast);
  }
  .add-btn {
    font-family: var(--font-mono);
    font-size: 0.8rem;
    background: var(--accent);
    color: var(--accent-contrast);
    border: none;
    border-radius: 6px;
    padding: 0.55rem 1rem;
    cursor: pointer;
    white-space: nowrap;
  }
  .add-btn:hover { filter: brightness(1.06); }

  .chip:focus-visible, .recipe-summary:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
    gap: 1.1rem;
  }
  .empty-state {
    grid-column: 1 / -1;
    color: var(--text-muted);
    font-size: 0.92rem;
    padding: 2.5rem 0;
    text-align: center;
    border: 1px dashed var(--border);
    border-radius: 8px;
  }

  .recipe {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: var(--shadow);
    overflow: hidden;
    position: relative;
  }
  .recipe::before {
    content: "";
    position: absolute;
    top: 0; left: 0;
    width: 5px;
    height: 100%;
    background: var(--tab-color, var(--accent));
  }
  .recipe.is-open { grid-column: 1 / -1; }

  .recipe-tools {
    position: absolute;
    top: 0.7rem;
    right: 0.75rem;
    display: none;
    gap: 0.35rem;
    z-index: 2;
  }
  .recipe.is-open .recipe-tools { display: flex; }
  .tool-btn {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    letter-spacing: 0.02em;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 0.25rem 0.5rem;
    border-radius: 5px;
    cursor: pointer;
  }
  .tool-btn:hover { color: var(--text); border-color: var(--tab-color, var(--accent)); }
  .tool-btn.danger:hover { color: var(--region-am); border-color: var(--region-am); }

  .recipe-summary {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 0.9rem;
    padding: 1.1rem 1.35rem;
    background: none;
    border: none;
    text-align: left;
    cursor: pointer;
    color: var(--text);
    font: inherit;
  }
  .recipe.is-open .recipe-summary { padding-right: 5.5rem; }
  .tag {
    font-family: var(--font-mono);
    font-size: 0.68rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--tab-color, var(--accent));
    border: 1px solid var(--tab-color, var(--accent));
    border-radius: 4px;
    padding: 0.15rem 0.4rem;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .summary-text { flex: 1; min-width: 0; }
  .dish-name {
    font-family: var(--font-display);
    font-size: 1.2rem;
    font-weight: 700;
    margin: 0;
    text-wrap: balance;
  }

  .recipe-detail {
    padding: 0 1.35rem 1.5rem;
    display: grid;
    grid-template-columns: minmax(200px, 260px) 1fr;
    gap: 2rem;
    border-top: 1px solid var(--border);
    padding-top: 1.25rem;
  }
  @media (max-width: 640px) {
    .recipe-detail { grid-template-columns: 1fr; }
  }
  .recipe-detail[hidden] { display: none; }

  .form-error {
    color: var(--region-am);
    font-size: 0.82rem;
    margin: 0 0 0.75rem;
  }

  .recipe-detail h3 {
    font-family: var(--font-mono);
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin: 0 0 0.7rem;
  }
  .ingredients ul {
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 0.45rem;
  }
  .ingredients li {
    display: flex;
    align-items: baseline;
    gap: 0.55rem;
    font-size: 0.92rem;
  }
  .qty {
    font-family: var(--font-mono);
    font-variant-numeric: tabular-nums;
    color: var(--tab-color, var(--accent));
    margin-right: 0.35rem;
  }
  .steps ol {
    margin: 0;
    padding: 0;
    list-style: none;
    counter-reset: step;
    display: flex;
    flex-direction: column;
    gap: 0.85rem;
  }
  .steps li {
    counter-increment: step;
    display: flex;
    gap: 0.75rem;
    font-size: 0.94rem;
  }
  .steps li::before {
    content: counter(step);
    font-family: var(--font-mono);
    font-size: 0.78rem;
    flex-shrink: 0;
    width: 1.6rem;
    height: 1.6rem;
    border-radius: 50%;
    border: 1px solid var(--tab-color, var(--accent));
    color: var(--tab-color, var(--accent));
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .tip {
    grid-column: 1 / -1;
    margin: 0.4rem 0 0;
    padding-top: 0.9rem;
    border-top: 1px dashed var(--border);
    font-size: 0.88rem;
    color: var(--text-muted);
  }
  .tip strong { color: var(--text); }

  footer.book-footer {
    margin-top: 3rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border);
    font-size: 0.8rem;
    color: var(--text-muted);
    font-family: var(--font-mono);
  }

  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(15,17,12,0.5);
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 3.5rem 1rem;
    overflow-y: auto;
    z-index: 50;
  }
  .modal-overlay[hidden] { display: none; }
  .modal-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    box-shadow: var(--shadow);
    width: 100%;
    max-width: 640px;
    padding: 1.85rem;
  }
  .modal-panel h2 {
    font-family: var(--font-display);
    font-size: 1.35rem;
    margin: 0 0 1.25rem;
  }
  .field { display: flex; flex-direction: column; gap: 0.3rem; margin-bottom: 1rem; }
  .field label {
    font-family: var(--font-mono);
    font-size: 0.68rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .field input[type="text"], .field select, .field textarea {
    font: inherit;
    font-family: var(--font-body);
    padding: 0.5rem 0.6rem;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
  }
  .field textarea { resize: vertical; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
  .dyn-list { display: flex; flex-direction: column; gap: 0.5rem; }
  .dyn-row { display: flex; gap: 0.5rem; align-items: center; }
  .dyn-row input { flex: 1; }
  .dyn-row input.qty-input { flex: 0 0 32%; }
  .remove-row-btn {
    flex-shrink: 0;
    width: 1.9rem; height: 1.9rem;
    border-radius: 5px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text-muted);
    cursor: pointer;
  }
  .remove-row-btn:hover { color: var(--region-am); border-color: var(--region-am); }
  .add-row-btn {
    align-self: flex-start;
    font-family: var(--font-mono);
    font-size: 0.75rem;
    border: 1px dashed var(--border);
    background: none;
    color: var(--text-muted);
    padding: 0.4rem 0.7rem;
    border-radius: 6px;
    cursor: pointer;
    margin-top: 0.3rem;
  }
  .add-row-btn:hover { color: var(--text); border-color: var(--accent); }
  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 0.6rem;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid var(--border);
  }
  .btn-primary {
    background: var(--accent);
    color: var(--accent-contrast);
    border: none;
    padding: 0.6rem 1.2rem;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 600;
    font-family: var(--font-body);
    font-size: 0.92rem;
  }
  .btn-danger { background: var(--region-am); }
  .btn-secondary {
    background: none;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.6rem 1.2rem;
    border-radius: 6px;
    cursor: pointer;
    font-family: var(--font-body);
    font-size: 0.92rem;
  }
  #confirmText { color: var(--text-muted); font-size: 0.92rem; margin: 0; }

  .chip-dot {
    display: inline-block;
    width: 0.55rem;
    height: 0.55rem;
    border-radius: 50%;
    margin-right: 0.4rem;
    vertical-align: middle;
  }
  .category-list {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    max-height: 320px;
    overflow-y: auto;
    margin-bottom: 1rem;
  }
  .category-row {
    display: flex;
    align-items: center;
    gap: 0.65rem;
    padding: 0.55rem 0.7rem;
    border: 1px solid var(--border);
    border-radius: 6px;
  }
  .cat-dot {
    width: 0.75rem;
    height: 0.75rem;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .cat-name { flex: 1; font-weight: 600; min-width: 0; }
  .cat-count {
    font-family: var(--font-mono);
    font-size: 0.75rem;
    color: var(--text-muted);
    white-space: nowrap;
  }
  .category-form-box {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1rem;
    margin-bottom: 1rem;
  }
  .category-form-box[hidden] { display: none; }
  .swatch-picker {
    display: flex;
    flex-wrap: wrap;
    gap: 0.55rem;
  }
  .swatch-option {
    width: 1.9rem;
    height: 1.9rem;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    padding: 0;
  }
  .swatch-option[data-selected="true"] {
    border-color: var(--text);
  }
  .manage-btn {
    font-family: var(--font-mono);
    font-size: 0.8rem;
    background: none;
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 0.55rem 1rem;
    cursor: pointer;
    white-space: nowrap;
  }
  .manage-btn:hover { border-color: var(--accent); }

  @media (max-width: 640px) {
    .wrap { padding: 2rem 1rem 3rem; }
    .toolbar-row { flex-direction: column; align-items: stretch; }
    .toolbar-actions { justify-content: flex-start; }
    .recipe-summary { gap: 0.6rem; }
    .recipe.is-open .recipe-summary { padding-right: 4.25rem; }
    .recipe-tools { top: 0.6rem; right: 0.6rem; }
    .modal-overlay { padding: 1.5rem 0.75rem; }
    .modal-panel { padding: 1.35rem; }
    .field-row { grid-template-columns: 1fr; }
    .dyn-row input.qty-input { flex: 0 0 40%; }
  }

  @media print {
    .filters, .add-btn, .manage-btn, .recipe-tools, .modal-overlay { display: none; }
    .recipe { break-inside: avoid; box-shadow: none; margin-bottom: 1rem; }
    .recipe-detail[hidden] { display: grid; }
    .grid { display: block; }
  }

  @media (prefers-reduced-motion: reduce) {
    .chip { transition: none; }
  }
</style>

<div class="wrap">
  <header class="book-header">
    <span class="eyebrow">Home Kitchen · Recipe Collection</span>
    <h1 class="book-title">우리집 레시피북</h1>
    <p class="book-sub">냉장고 앞에 붙여두고 바로 따라 할 수 있는 세계 각국 요리 모음. 재료를 확인하고, 순서는 번호만 따라가면 됩니다.</p>
    <p class="book-usage">요리 이름을 누르면 재료와 만드는 법이 펼쳐지고, 그 안에서 <kbd>수정</kbd>·<kbd>삭제</kbd>로 직접 고치거나 지울 수 있어요. <kbd>카테고리 관리</kbd>에서 분류를 자유롭게 추가·수정·삭제할 수도 있어요. 이 링크를 아는 모두에게 같은 내용이 실시간으로 공유돼요.</p>
  </header>

  <div class="toolbar-row">
    <nav class="filters" id="filters"></nav>
    <div class="toolbar-actions">
      <button type="button" class="btn-secondary" id="refreshBtn" style="padding:0.55rem 1rem; font-size:0.85rem;">새로고침</button>
      <button type="button" class="manage-btn" id="openCategoryBtn">카테고리 관리</button>
      <button type="button" class="add-btn" id="openAddBtn">+ 새 레시피 추가</button>
    </div>
  </div>

  <div class="grid" id="grid"></div>

  <footer class="book-footer" id="bookFooter"></footer>
</div>

<div class="modal-overlay" id="formOverlay" hidden>
  <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="formTitle">
    <h2 id="formTitle">새 레시피 추가</h2>
    <form id="recipeForm">
      <div class="field">
        <label for="f-region">카테고리</label>
        <select id="f-region"></select>
      </div>
      <div class="field">
        <label for="f-name">요리 이름</label>
        <input type="text" id="f-name" required>
      </div>
      <div class="field">
        <label>재료</label>
        <div class="dyn-list" id="f-ingredients"></div>
        <button type="button" class="add-row-btn" id="addIngredientBtn">+ 재료 추가</button>
      </div>
      <div class="field">
        <label>만드는 법</label>
        <div class="dyn-list" id="f-steps"></div>
        <button type="button" class="add-row-btn" id="addStepBtn">+ 단계 추가</button>
      </div>
      <div class="field">
        <label for="f-tip">팁 (선택)</label>
        <textarea id="f-tip" rows="2"></textarea>
      </div>
      <p id="formError" class="form-error" hidden></p>
      <div class="modal-actions">
        <button type="button" class="btn-secondary" id="formCancelBtn">취소</button>
        <button type="submit" class="btn-primary" id="formSaveBtn">저장</button>
      </div>
    </form>
  </div>
</div>

<div class="modal-overlay" id="confirmOverlay" hidden>
  <div class="modal-panel" role="alertdialog" aria-modal="true" style="max-width:420px">
    <h2>레시피를 삭제할까요?</h2>
    <p id="confirmText"></p>
    <p id="confirmError" class="form-error" hidden></p>
    <div class="modal-actions">
      <button type="button" class="btn-secondary" id="confirmCancelBtn">취소</button>
      <button type="button" class="btn-primary btn-danger" id="confirmDeleteBtn">삭제</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="categoryOverlay" hidden>

  var recipes = [];

  async function fetchRecipes() {
    var res = await fetch(REST_URL + '?select=*&order=created_at.asc', { headers: HEADERS });
    if (!res.ok) throw new Error('불러오기 실패 (' + res.status + ')');
    return res.json();
  }
  async function seedIfEmpty() {
    var rows = await fetchRecipes();
    if (rows.length > 0) return rows;
    var payload = SEED_RECIPES.map(function (r) {
      return { id: r.id, region: r.region, tag: r.tag, name: r.name, time: r.time, servings: r.servings, tip: r.tip || '', ingredients: r.ingredients, steps: r.steps };
    });
    try {
      var res = await fetch(REST_URL, {
        method: 'POST',
        headers: Object.assign({}, HEADERS, { Prefer: 'return=minimal' }),
        body: JSON.stringify(payload)
      });
      if (!res.ok && res.status !== 409) throw new Error('초기 데이터 등록 실패 (' + res.status + ')');
    } catch (e) { /* someone else may have seeded first; fall through to refetch */ }
    return fetchRecipes();
  }
  async function insertRecipe(payload) {
    var res = await fetch(REST_URL, {
      method: 'POST',
      headers: Object.assign({}, HEADERS, { Prefer: 'return=minimal' }),
      body: JSON.stringify([payload])
    });
    if (!res.ok) throw new Error('저장 실패 (' + res.status + ')');
  }
  async function updateRecipeRemote(id, patch) {
    var res = await fetch(REST_URL + '?id=eq.' + encodeURIComponent(id), {
      method: 'PATCH',
      headers: HEADERS,
      body: JSON.stringify(patch)
    });
    if (!res.ok) throw new Error('저장 실패 (' + res.status + ')');
  }
  async function deleteRecipeRemote(id) {
    var res = await fetch(REST_URL + '?id=eq.' + encodeURIComponent(id), {
      method: 'DELETE',
      headers: HEADERS
    });
    if (!res.ok) throw new Error('삭제 실패 (' + res.status + ')');
  }
  async function fetchCategories() {
    var res = await fetch(CATEGORIES_URL + '?select=*&order=sort_order.asc', { headers: HEADERS });
    if (!res.ok) throw new Error('카테고리 불러오기 실패 (' + res.status + ')');
    return res.json();
  }
  async function seedCategoriesIfEmpty() {
    var rows = await fetchCategories();
    if (rows.length > 0) return rows;
    try {
      var res = await fetch(CATEGORIES_URL, {
        method: 'POST',
        headers: Object.assign({}, HEADERS, { Prefer: 'return=minimal' }),
        body: JSON.stringify(DEFAULT_CATEGORIES)
      });
      if (!res.ok && res.status !== 409) throw new Error('초기 카테고리 등록 실패 (' + res.status + ')');
    } catch (e) { /* someone else may have seeded first; fall through to refetch */ }
    return fetchCategories();
  }
  async function insertCategory(payload) {
    var res = await fetch(CATEGORIES_URL, {
      method: 'POST',

    var res = await fetch(CATEGORIES_URL + '?id=eq.' + encodeURIComponent(id), {
      method: 'DELETE',
      headers: HEADERS

  function escapeHtml(str) {
    var div = document.createElement('div');
    div.textContent = str == null ? '' : String(str);
    return div.innerHTML;
  }

  function rebuildCategoriesById() {
    categoriesById = {};
    categories.forEach(function (c) { categoriesById[c.id] = c; });
  }

  function render() {
    renderFilters();
    renderGrid();
    var footer = document.getElementById('bookFooter');
    footer.textContent = '우리집 레시피북 · ' + recipes.length + ' recipes, ' + categories.length + ' categories';
  }

  function renderLoading() {
    document.getElementById('filters').innerHTML = '';
    document.getElementById('grid').innerHTML = '<p class="empty-state">레시피를 불러오는 중...</p>';
  }
  function renderError(err) {
    document.getElementById('filters').innerHTML = '';
    var grid = document.getElementById('grid');
    grid.innerHTML = '';
    var box = document.createElement('div');
    box.className = 'empty-state';
    box.innerHTML = '데이터를 불러오지 못했어요.<br><span style="font-family:var(--font-mono);font-size:0.78rem;">' +
      escapeHtml(String((err && err.message) || err)) +
      '</span><br><button type="button" class="btn-secondary" id="retryBtn" style="margin-top:0.75rem;">다시 시도</button>';
    grid.appendChild(box);
    document.getElementById('retryBtn').addEventListener('click', init);
  }
  async function init() {
    renderLoading();
    try {
      var results = await Promise.all([seedIfEmpty(), seedCategoriesIfEmpty()]);
      recipes = results[0];
      categories = results[1];
      rebuildCategoriesById();
    } catch (err) {
      renderError(err);
      return;
    }
    render();
  }

  function renderFilters() {
    var bar = document.getElementById('filters');
    bar.innerHTML = '';

    var allChip = document.createElement('button');
    allChip.type = 'button';
    allChip.className = 'chip';
    allChip.dataset.active = (activeFilter === '전체') ? 'true' : 'false';
    allChip.textContent = '전체 ' + recipes.length;
    allChip.addEventListener('click', function () { activeFilter = '전체'; render(); });
    bar.appendChild(allChip);

    categories.forEach(function (cat) {
      var count = recipes.filter(function (r) { return r.region === cat.id; }).length;
      var b = document.createElement('button');
      b.type = 'button';
      b.className = 'chip';
      b.dataset.active = (cat.id === activeFilter) ? 'true' : 'false';
      b.innerHTML = '<span class="chip-dot" style="background:var(--swatch-' + cat.color + ')"></span>' + escapeHtml(cat.name) + ' ' + count;
      b.addEventListener('click', function () { activeFilter = cat.id; render(); });
      bar.appendChild(b);
    });
  }

  function renderGrid() {
    var grid = document.getElementById('grid');
    grid.innerHTML = '';
    var list = recipes.filter(function (r) { return activeFilter === '전체' || r.region === activeFilter; });
    if (list.length === 0) {
      var empty = document.createElement('p');
      empty.className = 'empty-state';
      empty.textContent = '아직 이 분류에 레시피가 없어요. "+ 새 레시피 추가"로 첫 레시피를 등록해보세요.';
      grid.appendChild(empty);
      return;
    }
    list.forEach(function (r) { grid.appendChild(buildCard(r)); });
  }

  function buildCard(r) {
    var isOpen = !!openIds[r.id];
    var article = document.createElement('article');
    article.className = 'recipe' + (isOpen ? ' is-open' : '');
    article.dataset.region = r.region;
    var cat = categoriesById[r.region];
    article.style.setProperty('--tab-color', 'var(--swatch-' + (cat ? cat.color : 'pine') + ')');

    var tools = document.createElement('div');
    tools.className = 'recipe-tools';
    var editBtn = document.createElement('button');
    editBtn.type = 'button'; editBtn.className = 'tool-btn'; editBtn.textContent = '수정';
    editBtn.addEventListener('click', function (e) { e.stopPropagation(); openForm(r); });
    var delBtn = document.createElement('button');
    delBtn.type = 'button'; delBtn.className = 'tool-btn danger'; delBtn.textContent = '삭제';
    delBtn.addEventListener('click', function (e) { e.stopPropagation(); openConfirm(r); });
    tools.appendChild(editBtn); tools.appendChild(delBtn);

    var btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'recipe-summary';
    btn.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
    btn.innerHTML =
      '<span class="tag">' + escapeHtml(cat ? cat.name : r.region) + '</span>' +
      '<span class="summary-text">' +
        '<span class="dish-name">' + escapeHtml(r.name) + '</span>' +
      '</span>';
    btn.addEventListener('click', function () {
      if (openIds[r.id]) { delete openIds[r.id]; } else { openIds[r.id] = true; }
      render();
    });

    var detail = document.createElement('div');
    detail.className = 'recipe-detail';
    if (!isOpen) detail.hidden = true;
    var ingHtml = r.ingredients.map(function (ing) {
      return '<li><span class="qty">' + escapeHtml(ing.qty) + '</span>' + escapeHtml(ing.name) + '</li>';
    }).join('');
    var stepHtml = r.steps.map(function (s) { return '<li>' + escapeHtml(s) + '</li>'; }).join('');
    detail.innerHTML =
      '<div class="ingredients"><h3>재료</h3><ul>' + ingHtml + '</ul></div>' +
      '<div class="steps"><h3>만드는 법</h3><ol>' + stepHtml + '</ol></div>' +
      (r.tip ? '<p class="tip"><strong>Tip.</strong> ' + escapeHtml(r.tip) + '</p>' : '');

    article.appendChild(tools);
    article.appendChild(btn);
    article.appendChild(detail);
    return article;
  }

  function ingredientRow(qty, name) {
    var row = document.createElement('div');
    row.className = 'dyn-row';
    var nameInput = document.createElement('input');
    nameInput.type = 'text'; nameInput.placeholder = '재료명'; nameInput.value = name || '';
    var qtyInput = document.createElement('input');
    qtyInput.type = 'text'; qtyInput.className = 'qty-input'; qtyInput.placeholder = '분량'; qtyInput.value = qty || '';
    var rm = document.createElement('button');
    rm.type = 'button'; rm.className = 'remove-row-btn'; rm.textContent = '×';
    rm.addEventListener('click', function () { row.remove(); });
    row.appendChild(nameInput); row.appendChild(qtyInput); row.appendChild(rm);
    return row;
  }
  function stepRow(text) {
    var row = document.createElement('div');
    row.className = 'dyn-row';
    var input = document.createElement('input');
    input.type = 'text'; input.placeholder = '조리 순서'; input.value = text || '';
    var rm = document.createElement('button');
    rm.type = 'button'; rm.className = 'remove-row-btn'; rm.textContent = '×';
    rm.addEventListener('click', function () { row.remove(); });
    row.appendChild(input); row.appendChild(rm);
    return row;
  }

  function openForm(recipe) {
    document.getElementById('formError').hidden = true;
    editingId = recipe ? recipe.id : null;
    document.getElementById('formTitle').textContent = recipe ? '레시피 수정' : '새 레시피 추가';
    var regionSelect = document.getElementById('f-region');
    regionSelect.innerHTML = categories.map(function (c) {
      return '<option value="' + escapeHtml(c.id) + '">' + escapeHtml(c.name) + '</option>';
    }).join('');
    regionSelect.value = recipe ? recipe.region : (categories[0] ? categories[0].id : '');
    document.getElementById('f-name').value = recipe ? recipe.name : '';
    document.getElementById('f-tip').value = recipe ? (recipe.tip || '') : '';

    var ingWrap = document.getElementById('f-ingredients');
    ingWrap.innerHTML = '';
    (recipe ? recipe.ingredients : [{ qty: '', name: '' }]).forEach(function (ing) {
      ingWrap.appendChild(ingredientRow(ing.qty, ing.name));
    });

    var stepWrap = document.getElementById('f-steps');
    stepWrap.innerHTML = '';
    (recipe ? recipe.steps : ['']).forEach(function (s) { stepWrap.appendChild(stepRow(s)); });

    document.getElementById('formOverlay').hidden = false;
    document.getElementById('f-name').focus();
  }
  function closeForm() {
    document.getElementById('formOverlay').hidden = true;
    editingId = null;
  }

  document.getElementById('openAddBtn').addEventListener('click', function () { openForm(null); });
  document.getElementById('addIngredientBtn').addEventListener('click', function () {
    document.getElementById('f-ingredients').appendChild(ingredientRow('', ''));
  });
  document.getElementById('addStepBtn').addEventListener('click', function () {
    document.getElementById('f-steps').appendChild(stepRow(''));
  });
  document.getElementById('formCancelBtn').addEventListener('click', closeForm);
  document.getElementById('formOverlay').addEventListener('click', function (e) {
    if (e.target === this) closeForm();
  });

  document.getElementById('recipeForm').addEventListener('submit', async function (e) {
    e.preventDefault();
    var name = document.getElementById('f-name').value.trim();
    if (!name) { document.getElementById('f-name').focus(); return; }
    var region = document.getElementById('f-region').value;
    var tip = document.getElementById('f-tip').value.trim();

    var ingredients = Array.prototype.slice.call(document.querySelectorAll('#f-ingredients .dyn-row')).map(function (row) {
      var inputs = row.querySelectorAll('input');
      return { name: inputs[0].value.trim(), qty: inputs[1].value.trim() };
    }).filter(function (ing) { return ing.name; });

    var steps = Array.prototype.slice.call(document.querySelectorAll('#f-steps .dyn-row')).map(function (row) {
      return row.querySelector('input').value.trim();
    }).filter(function (s) { return s; });

    var formError = document.getElementById('formError');
    formError.hidden = true;
    var saveBtn = document.getElementById('formSaveBtn');
    saveBtn.disabled = true;
    saveBtn.textContent = '저장 중...';
    try {
      if (editingId) {
        await updateRecipeRemote(editingId, {
          region: region, name: name, tip: tip, ingredients: ingredients, steps: steps
        });
        openIds[editingId] = true;
      } else {
        var id = 'r-' + Date.now() + '-' + Math.random().toString(36).slice(2, 7);
        await insertRecipe({ id: id, region: region, tag: region, name: name, tip: tip, ingredients: ingredients, steps: steps });
        openIds[id] = true;
      }
      recipes = await fetchRecipes();
      closeForm();
      activeFilter = '전체';
      render();
    } catch (err) {
      formError.textContent = String((err && err.message) || err);
      formError.hidden = false;
    } finally {
      saveBtn.disabled = false;
      saveBtn.textContent = '저장';
    }
  });

  function openConfirm(recipe) {
    document.getElementById('confirmError').hidden = true;
    deletingId = recipe.id;
    document.getElementById('confirmText').textContent = '"' + recipe.name + '" 레시피를 삭제합니다. 이 작업은 되돌릴 수 없어요.';
    document.getElementById('confirmOverlay').hidden = false;
  }
  function closeConfirm() {
    deletingId = null;
    document.getElementById('confirmOverlay').hidden = true;
  }
  document.getElementById('confirmCancelBtn').addEventListener('click', closeConfirm);
  document.getElementById('confirmOverlay').addEventListener('click', function (e) {
    if (e.target === this) closeConfirm();
  });
  document.getElementById('confirmDeleteBtn').addEventListener('click', async function () {
    var confirmError = document.getElementById('confirmError');
    confirmError.hidden = true;
    var delBtn = document.getElementById('confirmDeleteBtn');
    delBtn.disabled = true;
    delBtn.textContent = '삭제 중...';
    try {
      await deleteRecipeRemote(deletingId);
      delete openIds[deletingId];
      recipes = await fetchRecipes();
      closeConfirm();
      render();
    } catch (err) {
      confirmError.textContent = String((err && err.message) || err);
      confirmError.hidden = false;
    } finally {
      delBtn.disabled = false;
      delBtn.textContent = '삭제';
    }
  });

  function renderCategoryList() {
    var list = document.getElementById('categoryList');
    list.innerHTML = '';
    categories.forEach(function (cat) {
      var count = recipes.filter(function (r) { return r.region === cat.id; }).length;
      var row = document.createElement('div');
      row.className = 'category-row';

      var dot = document.createElement('span');
      dot.className = 'cat-dot';
      dot.style.background = 'var(--swatch-' + cat.color + ')';

      var name = document.createElement('span');
      name.className = 'cat-name';
      name.textContent = cat.name;

      var countEl = document.createElement('span');
      countEl.className = 'cat-count';
      countEl.textContent = count + '개';

      var editBtn = document.createElement('button');
      editBtn.type = 'button'; editBtn.className = 'tool-btn'; editBtn.textContent = '수정';
      editBtn.addEventListener('click', function () { openCategoryForm(cat); });

      var delBtn = document.createElement('button');
      delBtn.type = 'button'; delBtn.className = 'tool-btn danger'; delBtn.textContent = '삭제';
      delBtn.addEventListener('click', async function () {
        var categoryError = document.getElementById('categoryError');
        categoryError.hidden = true;
        var liveCount = recipes.filter(function (r) { return r.region === cat.id; }).length;
        if (liveCount > 0) {
          categoryError.textContent = '이 카테고리를 사용 중인 레시피가 ' + liveCount + '개 있어요. 레시피의 카테고리를 먼저 바꾸거나 삭제해주세요.';
          categoryError.hidden = false;
          return;
        }
        delBtn.disabled = true;
        try {
          await deleteCategoryRemote(cat.id);
          categories = await fetchCategories();
          rebuildCategoriesById();
          if (activeFilter === cat.id) activeFilter = '전체';
          renderCategoryList();
          render();
        } catch (err) {
          categoryError.textContent = String((err && err.message) || err);
          categoryError.hidden = false;
        } finally {
          delBtn.disabled = false;
        }
      });

      row.appendChild(dot);
      row.appendChild(name);
      row.appendChild(countEl);
      row.appendChild(editBtn);
      row.appendChild(delBtn);
      list.appendChild(row);
    });
  }

  function renderSwatchPicker(selected) {
    var picker = document.getElementById('swatchPicker');
    picker.innerHTML = '';
    SWATCHES.forEach(function (key) {
      var opt = document.createElement('button');
      opt.type = 'button';
      opt.className = 'swatch-option';
      opt.style.background = 'var(--swatch-' + key + ')';
      opt.dataset.color = key;
      opt.dataset.selected = (key === selected) ? 'true' : 'false';
      opt.setAttribute('aria-label', key);
      opt.addEventListener('click', function () {
        Array.prototype.forEach.call(picker.querySelectorAll('.swatch-option'), function (el) {
          el.dataset.selected = 'false';
        });
        opt.dataset.selected = 'true';
      });
      picker.appendChild(opt);
    });
  }

  function openCategoryForm(cat) {
    document.getElementById('categoryError').hidden = true;
    editingCategoryId = cat ? cat.id : null;
    document.getElementById('cat-name').value = cat ? cat.name : '';
    renderSwatchPicker(cat ? cat.color : SWATCHES[0]);
    document.getElementById('categoryFormBox').hidden = false;
    document.getElementById('cat-name').focus();
  }
  function closeCategoryForm() {
    document.getElementById('categoryFormBox').hidden = true;
    editingCategoryId = null;
  }

  function openCategoryModal() {
    closeCategoryForm();
    renderCategoryList();
    document.getElementById('categoryOverlay').hidden = false;
  }
  function closeCategoryModal() {
    document.getElementById('categoryOverlay').hidden = true;
  }

  document.getElementById('openCategoryBtn').addEventListener('click', openCategoryModal);
  document.getElementById('categoryCloseBtn').addEventListener('click', closeCategoryModal);
  document.getElementById('categoryOverlay').addEventListener('click', function (e) {
    if (e.target === this) closeCategoryModal();
  });
  document.getElementById('addCategoryBtn').addEventListener('click', function () { openCategoryForm(null); });
  document.getElementById('categoryFormCancelBtn').addEventListener('click', closeCategoryForm);

  document.getElementById('categoryFormSaveBtn').addEventListener('click', async function () {
    var name = document.getElementById('cat-name').value.trim();
    var categoryError = document.getElementById('categoryError');
    categoryError.hidden = true;
    if (!name) { document.getElementById('cat-name').focus(); return; }
    var selectedSwatch = document.querySelector('#swatchPicker .swatch-option[data-selected="true"]');
    var color = selectedSwatch ? selectedSwatch.dataset.color : SWATCHES[0];

    var saveBtn = document.getElementById('categoryFormSaveBtn');
    saveBtn.disabled = true;
    saveBtn.textContent = '저장 중...';
    try {
      if (editingCategoryId) {
        await updateCategoryRemote(editingCategoryId, { name: name, color: color });
      } else {
        var maxOrder = categories.reduce(function (m, c) { return Math.max(m, c.sort_order || 0); }, 0);
        var id = 'c-' + Date.now() + '-' + Math.random().toString(36).slice(2, 7);
        await insertCategory({ id: id, name: name, color: color, sort_order: maxOrder + 1 });
      }
      categories = await fetchCategories();
      rebuildCategoriesById();
      closeCategoryForm();
      renderCategoryList();
      render();
    } catch (err) {
      categoryError.textContent = String((err && err.message) || err);
      categoryError.hidden = false;
    } finally {
      saveBtn.disabled = false;
      saveBtn.textContent = '저장';
    }
  });

  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') {
      if (!document.getElementById('formOverlay').hidden) closeForm();
      if (!document.getElementById('confirmOverlay').hidden) closeConfirm();
      if (!document.getElementById('categoryOverlay').hidden) closeCategoryModal();
    }
  });

  document.getElementById('refreshBtn').addEventListener('click', async function () {
    try {
      var results = await Promise.all([fetchRecipes(), fetchCategories()]);
      recipes = results[0];
      categories = results[1];
      rebuildCategoriesById();
      render();
    } catch (err) {
      renderError(err);
    }
  });

  init();
})();
</script>
